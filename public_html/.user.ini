; =============================================================================
; Aurum Vault Logistics - PHP Production Settings for cPanel
; =============================================================================
; This file is used by PHP-FPM (CGI/FastCGI) on cPanel hosting
; Place this in the document root (public_html/)
; =============================================================================

; Error handling - hide errors in production
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Session security
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1
session.use_only_cookies = 1

; File uploads
upload_max_filesize = 5M
post_max_size = 6M
max_file_uploads = 5

; Performance
max_execution_time = 60
memory_limit = 128M

; Timezone
date.timezone = UTC

; Hide PHP version
expose_php = Off
